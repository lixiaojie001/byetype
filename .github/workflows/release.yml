name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RAW=$(git log --pretty=format:'%s' -10)
          else
            RAW=$(git log --pretty=format:'%s' ${PREV_TAG}..HEAD --no-merges)
          fi
          NOTES=$(echo "$RAW" | grep -viE '^(chore|build|ci|docs|style|test|refactor)(\(.*\))?:' | sed -E 's/^[a-zA-Z]+(\(.*\))?:[[:space:]]*//' | sed 's/^/- /' || true)
          if [ -z "$NOTES" ]; then
            NOTES=$(echo "$RAW" | sed -E 's/^[a-zA-Z]+(\(.*\))?:[[:space:]]*//' | sed 's/^/- /')
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Import code signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo $APPLE_CERTIFICATE | base64 --decode > $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

          echo "Signing identity:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && 'ByeType Developer' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ByeType ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonKeepUniversal: true

      - name: Upload platform latest.json
        shell: bash
        run: |
          TAG="$GITHUB_REF_NAME"
          # Download the latest.json just uploaded by tauri-action
          gh release download "$TAG" --pattern 'latest.json' --output latest.json --clobber
          # Determine a platform-specific suffix
          if [[ "${{ matrix.args }}" == *"aarch64"* ]]; then
            SUFFIX="macos-aarch64"
          elif [[ "${{ matrix.args }}" == *"x86_64"* ]]; then
            SUFFIX="macos-x86_64"
          else
            SUFFIX="windows-x86_64"
          fi
          mv latest.json "latest-${SUFFIX}.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ strategy.job-index }}
          path: latest-*.json

  merge-updater-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-*
          merge-multiple: true
          path: updater-parts

      - name: Merge latest.json
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys

          parts = sorted(glob.glob("updater-parts/latest-*.json"))
          if not parts:
              print("ERROR: no latest-*.json found", file=sys.stderr)
              sys.exit(1)

          merged = None
          for p in parts:
              with open(p) as f:
                  data = json.load(f)
              if merged is None:
                  merged = data
              else:
                  merged["platforms"].update(data["platforms"])

          print(f"Merged platforms: {list(merged['platforms'].keys())}")
          with open("latest.json", "w") as f:
              json.dump(merged, f, indent=2)
          PYEOF

      - name: Upload merged latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" latest.json --clobber
