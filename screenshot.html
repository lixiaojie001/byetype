<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: crosshair;
      background: #000;
      touch-action: none;
      user-select: none;
    }
    #screenshot-bg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    /* Dark overlay covering unselected area */
    #overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    /* Selection rectangle — cuts through the overlay */
    #selection {
      position: absolute;
      border: 2px solid #fff;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
      display: none;
      pointer-events: none;
    }
    /* Size indicator */
    #size-label {
      position: absolute;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: -apple-system, sans-serif;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img id="screenshot-bg" />
  <div id="overlay"></div>
  <div id="selection"></div>
  <div id="size-label"></div>
  <script type="module" src="/src/views/screenshot/main.ts"></script>
</body>
</html>
