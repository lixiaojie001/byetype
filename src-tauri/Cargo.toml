[package]
name = "byetype-tauri"
version = "1.0.0"
description = "ByeType - Markdown driven voice input"
authors = ["lishaojie"]
edition = "2021"

[lib]
name = "byetype_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
